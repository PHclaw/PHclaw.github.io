<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHclaw | Open Source Developer</title>
  <meta name="description" content="70+ open source projects and skills for developers. AI agents, devtools, CLI utilities, SaaS starters, and Claude/OpenClaw skills.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface-2: #1c2128; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff; --accent-2: #a371f7; --accent-3: #79c0ff;
      --green: #3fb950; --yellow: #d29922; --red: #f85149;
      --ai: #a371f7; --devtools: #58a6ff; --saas: #3fb950; --cli: #d29922; --cn: #f85149; --skill: #79c0ff; --claude: #a371f7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    header { padding: 60px 0 40px; text-align: center; border-bottom: 1px solid var(--border); }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg,#58a6ff,#a371f7); display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; }
    h1 { font-size: 42px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    .subtitle { color: var(--text-muted); font-size: 18px; max-width: 640px; margin: 0 auto 24px; }
    .stats-bar { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

    .tab-section { border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .tabs { display: flex; justify-content: center; padding: 0; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); padding: 16px 32px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; display: flex; align-items: center; gap: 8px; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-count { background: var(--surface-2); color: var(--text-muted); font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .tab-btn.active .tab-count { background: rgba(88,166,255,0.2); color: var(--accent); }

    .filter-section { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .section { padding: 40px 0; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; }
    .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: all 0.2s; position: relative; overflow: hidden; }
    .project-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .project-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg,var(--accent),var(--accent-2)); opacity: 0; transition: opacity 0.2s; }
    .project-card:hover::before { opacity: 1; }
    .project-card.hidden { display: none; }

    .project-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .project-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .project-title-wrap { flex: 1; min-width: 0; }
    .project-name { font-size: 16px; font-weight: 600; color: var(--text); text-decoration: none; display: block; margin-bottom: 4px; }
    .project-name:hover { color: var(--accent); }
    .project-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--surface-2); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
    .tag.ai { background: rgba(163,113,247,0.15); color: #a371f7; }
    .tag.devtools { background: rgba(88,166,255,0.15); color: #58a6ff; }
    .tag.saas { background: rgba(63,185,80,0.15); color: #3fb950; }
    .tag.cli { background: rgba(210,153,34,0.15); color: #d29922; }
    .tag.cn { background: rgba(248,81,73,0.15); color: #f85149; }
    .tag.skill { background: rgba(121,192,255,0.15); color: #79c0ff; }
    .tag.claude { background: rgba(163,113,247,0.15); color: #a371f7; }
    .tag.閲戣瀺 { background: rgba(62,196,100,0.15); color: #3ec464; }
    .tag.娉曞緥 { background: rgba(210,153,34,0.15); color: #d29922; }
    .tag.鏁欒偛 { background: rgba(88,166,255,0.15); color: #58a6ff; }
    .tag.HR { background: rgba(163,113,247,0.15); color: #a371f7; }
    .tag.鍟嗕笟 { background: rgba(255,136,0,0.15); color: #ff8800; }
    .tag.鍖荤枟 { background: rgba(239,68,68,0.15); color: #ef4444; }
    .tag.钀ラ攢 { background: rgba(236,72,153,0.15); color: #ec4899; }
    .tag.鎴夸骇 { background: rgba(99,102,241,0.15); color: #6366f1; }
    .project-desc { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin-bottom: 14px; min-height: 40px; }
    .project-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }
    .project-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); }
    .meta-item { display: flex; align-items: center; gap: 4px; }
    .github-btn { display: inline-flex; align-items: center; gap: 5px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 5px 11px; border-radius: 6px; font-size: 12px; text-decoration: none; transition: all 0.2s; }
    .github-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .stars { color: var(--yellow); font-size: 12px; }
    .featured-badge { position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg,#58a6ff,#a371f7); color: #fff; font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .new-badge { position: absolute; top: 12px; right: 12px; background: var(--green); color: #fff; font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    footer { padding: 40px 0; text-align: center; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 13px; }
    .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; }
    .social-link { color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .social-link:hover { color: var(--accent); }

    @media (max-width: 768px) { h1 { font-size: 30px; } .projects-grid { grid-template-columns: 1fr; } .stats-bar { gap: 24px; } .tab-btn { padding: 14px 20px; font-size: 14px; } }
  </style>
</head>

  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });
    document.querySelectorAll('.filter-section').forEach(fs => {
      fs.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const filter = btn.dataset.filter;
          const tabId = fs.closest('.tab-content').id;
          document.getElementById(tabId).querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(tabId).querySelectorAll('.project-card').forEach(card => {
            card.classList.toggle('hidden', filter !== 'all' && !card.dataset.categories.includes(filter));
          });
        });
      });
    });
  </script>
